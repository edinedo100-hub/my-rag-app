services:
  - type: web
    name: my-rag-app
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import os; os.environ['SENTENCE_TRANSFORMERS_HOME']='./model_cache'; from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: ./model_cache
